model:
  name: "Qwen/Qwen2.5-VL-3B-Instruct"
  max_seq_length: 2048
  # V100 Specifics
  dtype: "float16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  finetune_attention_modules: true
  finetune_mlp_modules: true

data:
  train_path: "/scratch/iris/finebio_data/train_mini.jsonl"
  val_path: "/scratch/iris/finebio_data/val_mini.jsonl"
  max_frames: 8
  max_pixels: 307200      # 640x480

training:
  batch_size: 1
  gradient_accumulation_steps: 32 # 1 * 32 = 32 Effective Batch Size

  # Need to make it compatible for V100 inference
  fp16: true                      # V100 compatible
  bf16: false                     # V100 doesn't support bf16
  optim: "paged_adamw_8bit"
  
  learning_rate: 5.0e-5
  warmup_steps: 20
  max_grad_norm: 0.3
  weight_decay: 0.01

  max_steps: 60
  output_dir: "/scratch/iris/checkpoints/qwen3b_test_run"
  save_steps: 20
  logging_steps: 1
  gradient_checkpointing: true
