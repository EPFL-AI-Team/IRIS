model:
  name: "unsloth/Qwen2.5-VL-3B-Instruct-bnb-4bit"  # 3B, not 7B
  load_in_4bit: true
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  finetune_vision_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

data:
  train_path: "/scratch/izar/mhamelin/finebio_data/train.jsonl"
  val_path: "/scratch/izar/mhamelin/finebio_data/val.jsonl"

training:
  batch_size: 4                      # Lower for 3B + 8 frames
  gradient_accumulation_steps: 8     # Effective batch = 32
  warmup_steps: 100
  max_steps: 1500                    # ~1 epoch on 40k samples
  learning_rate: 2.0e-4              # Standard for LoRA
  output_dir: "/scratch/izar/mhamelin/checkpoints/qwen3b_finebio"
  save_steps: 100
  logging_steps: 10
