# Hardware-specific overrides for Mac M3
# MPS backend has different characteristics

model:
  dtype: "float16"                      # M3 doesn't support bfloat16 on MPS

training:
  # Mac-specific settings
  bf16: false                           # MPS doesn't support bf16
  fp16: true                            # Use fp16 instead
  
  # Smaller batch for 16GB unified memory
  batch_size: 1                         # Much smaller due to unified memory
  gradient_accumulation_steps: 32       # Still effective batch = 32
  
  # Disable features not supported on MPS
  gradient_checkpointing: false         # Can cause issues on MPS

lora:
  # Smaller rank for limited memory
  r: 8                                  # Half the rank
  alpha: 16
