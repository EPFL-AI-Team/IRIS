# Example configuration for the dataset scripts.
# Copy to `dataset_config.yaml` and edit paths.
#
# Notes:
# - Prefer absolute paths. Only `~` is expanded automatically.

default_profile: mac

default_split_name: default

profiles:
  mac:
    annotations_dir: "/Users/<you>/.../finebio/annotations/finebio_action_annotations"
    videos_dir: "/Users/<you>/.../finebio/videos/w640"
    output_dir: "/Users/<you>/.../finebio_processed"

  rcp:
    annotations_dir: "/work/.../finebio/annotations/finebio_action_annotations"
    videos_dir: "/work/.../finebio/videos/w640"
    output_dir: "/scratch/<you>/finebio_processed"

  izar:
    annotations_dir: "/work/.../finebio/annotations/finebio_action_annotations"
    videos_dir: "/work/.../finebio/videos/w640"
    output_dir: "/scratch/<you>/finebio_processed"
