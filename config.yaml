# IRIS Configuration
# Override via environment variables: IRIS_SERVER__PORT=8002

server:
  vlm_config: "serve"  # References configs/vlm/serve.yaml
  vlm_hardware: null   # Optional: Override with hardware profile (mac_m3, v100, cpu)
  max_queue_size: 10
  num_workers: 1
  host: "0.0.0.0"
  port: 8001
  graceful_shutdown_timeout: 30.0
  enable_log_streaming: true
  log_streaming_min_level: "INFO"
  enable_metrics: true

memory_buffer:
  # StreamBridge memory buffer for temporal visual understanding
  enabled: false  # Enable after implementing embedding storage
  max_buffer_tokens: 16384  # Qwen2.5-VL context window
  tokens_per_frame: 210  # After Vision-Language Merger pooling
  fps: 1.0  # Frame sampling rate
  compression_strategy: "round_decayed"
  recency_decay_factor: 0.95  # Weight newer frames higher
  # Derived: max_frames_in_buffer = 16384 // 210 = ~78 frames

jobs:
  frame_collection:
    # Updated defaults for 1 FPS streaming
    trigger:
      frame_count: 5  # Trigger every 5 frames at 1 FPS = 5 seconds
      time_seconds: 5.0  # Alternative trigger
    frame_skip: 1  # Keep all frames at 1 FPS (was 60)
    debug_logging: false
    continuous: true

client:
  video:
    width: 640
    height: 480
    fps: 10
    jpeg_quality: 80
    camera_index: 0
  server:
    host: "localhost"
    port: 8001
    use_ssl: false
  web:
    host: "0.0.0.0"
    port: 8006
    use_ssl: false
    cert_dir: "~/iris-certs"  # Directory containing key.pem and cert.pem
