# IRIS Configuration
# Override via environment variables: IRIS_SERVER__PORT=8002

server:
  vlm_config: "serve"  # References configs/vlm/serve.yaml
  vlm_hardware: null   # Optional: Override with hardware profile (mac_m3, v100, cpu)
  max_queue_size: 10
  num_workers: 1
  host: "0.0.0.0"
  port: 8001
  graceful_shutdown_timeout: 30.0
  enable_log_streaming: true
  log_streaming_min_level: "INFO"
  enable_metrics: true

jobs:
  video:
    trigger_mode: "periodic"  # "periodic" | "manual" | "disabled"
    buffer_size: 8
    overlap_frames: 4

client:
  video:
    width: 640
    height: 480
    fps: 10
    jpeg_quality: 80
    camera_index: 0
  server:
    host: "localhost"
    port: 8001
    use_ssl: false
  web:
    host: "0.0.0.0"
    port: 8006
    use_ssl: true
    cert_dir: "~/iris-certs"  # Directory containing key.pem and cert.pem
  ssh_tunnel:
    enabled: false  # Toggle on for IZAR HPC
    ssh_host: "izar.hpc.epfl.ch"
    ssh_user: "mhamelin"
    ssh_key_path: "~/.ssh/id_rsa"
    remote_host: ""  # Set via UI or config (IZAR compute node hostname)
