# IRIS Configuration
# Override via environment variables: IRIS_SERVER__PORT=8002

server:
  host: 0.0.0.0
  port: 8005
  model_id: "HuggingFaceTB/SmolVLM2-500M-Video-Instruct"
  # model_id: "unsloth/Qwen2.5-VL-3B-Instruct-bnb-4bit"
  # model_id: "unsloth/Qwen2.5-VL-7B-Instruct-bnb-4bit"  # Direct model selection (qwen2.5-7b)
  # vlm_hardware: "v100"
  # vlm_hardware: "mac"      # Optional: Hardware profile (v100, mac, etc.)
  # model_dtype: "float16"   # Optional: Override dtype (float16, float32, bfloat16, auto)
  
  # Backpressure Control:
  # - Set to 1 for Mac/Consumer GPU (Strict dropping to prevent OOM/Lag)
  # - Set to 4-8 for A100/H100 (Allow buffering for higher throughput)
  live_queue_threshold: 1
  
  max_queue_size: 10
  num_workers: 1
  graceful_shutdown_timeout: 30.0
  enable_log_streaming: true
  log_streaming_min_level: "INFO"
  enable_metrics: true
  jobs:
    video:
      buffer_size: 4
      overlap_frames: 2
      default_fps: 5
      max_new_tokens: 128
      prompt: "Analyze this video segment of a biological experiment. Return one JSON object with keys: action (human action/pose), tool (object used), target (object acted on), context (scene/activity). Respond with JSON only—no markdown, no prose, no code fences."

client:
  video:
    width: 640
    height: 480
    capture_fps: 10
    jpeg_quality: 80
    camera_index: 0
  server:
    host: "localhost"
    port: 8005
    use_ssl: false
  web:
    host: "0.0.0.0"
    port: 8006
    use_ssl: true
    cert_dir: "~/iris-certs"  # Directory containing key.pem and cert.pem

  # Segment configuration defaults (T, s, k)
  segment:
    segment_time: 1.0        # T: Duration of each segment in seconds
    frames_per_segment: 8    # s: Number of frames per segment
    overlap_frames: 4        # k: Number of overlap frames
