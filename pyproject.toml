[project]
name = "iris"
version = "0.1.0"
description = "IRIS - Video understanding ML system"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "accelerate>=1.10.1",
    "jupyter>=1.1.1",
    "num2words>=0.5.14",
    "numpy>=2.3.3",
    "opencv-python>=4.11.0.86",
    "pillow>=11.3.0",
    "pydantic>=2.12.2",
    "qwen-vl-utils>=0.0.14",
    "ruff>=0.13.2",
    "torch>=2.8.0",
    "torchcodec>=0.7.0",
    "torchvision>=0.23.0",
    "tqdm>=4.67.1",
    "transformers>=4.56.2",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.13.2",
    "ipykernel>=6.29.0", # For Jupyter in VS Code
]

[project.scripts]
iris = "iris.main:cli"
# iris-process = "iris.vlm.inference.model_loader:process_video"  # Example: additional commands

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iris"]
