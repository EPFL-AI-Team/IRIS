[project]
name = "iris"
version = "0.1.0"
description = "IRIS - Video understanding ML system"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "jupyter>=1.1.1",
    "numpy>=2.3.3",
    "pandas>=2.3.3",
    "pillow>=11.3.0",
    "pydantic>=2.12.2",
    "pydantic-settings>=2.12.0",
    "pyyaml>=6.0.3",
    "ruff>=0.13.2",
    "seaborn>=0.13.2",
    "tqdm>=4.67.1",
    "websockets>=15.0.1",
    "opencv-python>=4.11.0.86 ; sys_platform == 'darwin'", # Mac: full version with GUI
    "opencv-python-headless>=4.11.0.86 ; sys_platform == 'linux'", # Pi/V100: headless
    "threaded-videocapture>=1.0.1",
    "fastapi>=0.121.1",
    "uvicorn>=0.38.0",
    "ffmpeg-python>=0.2.0",
    "google-genai>=1.53.0",
]

[dependency-groups]
dev = [
    "google-generativeai>=0.8.5",
    "tqdm>=4.67.1",
]
# Server-only dependencies (V100 + Mac dev)
server = [
    "accelerate>=1.10.1",
    "bitsandbytes>=0.48.2 ; platform_system == 'Linux'",
    "num2words>=0.5.14",
    "nvidia-ml-py>=11.5.0 ; platform_system == 'Linux'",
    "qwen-vl-utils>=0.0.14",
    "torch>=2.8.0",
    "torchcodec>=0.7.0 ; sys_platform == 'darwin' or (sys_platform == 'linux' and platform_machine == 'x86_64')",
    "torchvision>=0.23.0",
    "transformers>=4.57.0",
]

[project.optional-dependencies]
dev = [
    "ipykernel>=6.29.0", # For Jupyter in VS Code
]

[project.scripts]
iris-client = "iris.client.web.app:main"
iris-server = "iris.server.app:main"
iris-test = "iris.cli.local_test:cli"
iris = "iris.cli.local_test:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iris"]
